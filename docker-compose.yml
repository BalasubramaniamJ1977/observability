version: "3.8"

x-service-defaults: &service-defaults
  restart: unless-stopped
  networks:
    - payment-net

# OTEL Java Agent env vars shared by all payment services.
# The agent auto-instruments Spring MVC + RestTemplate — no code changes needed.
x-otel-env: &otel-env
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
  OTEL_EXPORTER_OTLP_PROTOCOL: grpc
  OTEL_LOGS_EXPORTER: otlp
  OTEL_METRICS_EXPORTER: otlp
  OTEL_RESOURCE_ATTRIBUTES: deployment.environment=payment-system

services:
  # ── Infrastructure ──────────────────────────────────────────────────────────

  elasticsearch:
    <<: *service-defaults
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "19200:9200"  # host 19200; local ES 9.3.1 already holds 9200
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  loki:
    <<: *service-defaults
    image: grafana/loki:latest
    command: ["-config.file=/etc/loki/loki.yaml"]
    volumes:
      - ./loki.yaml:/etc/loki/loki.yaml
      - loki-data:/loki
    ports:
      - "3100:3100"

  tempo:
    <<: *service-defaults
    image: grafana/tempo:latest
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"
      - "9095:9095"  # Tempo gRPC

  otel-collector:
    <<: *service-defaults
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "14317:4317"  # OTLP gRPC  (host 14317 → container 4317; avoids conflicts)
      - "14318:4318"  # OTLP HTTP  (host 14318 → container 4318)
      - "8889:8889"   # Prometheus metrics exporter
    depends_on:
      elasticsearch:
        condition: service_healthy
      tempo:
        condition: service_started

  prometheus:
    <<: *service-defaults
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
      - "--web.enable-remote-write-receiver"
    ports:
      - "9090:9090"
    depends_on:
      - otel-collector

  grafana:
    <<: *service-defaults
    image: grafana/grafana:10.3.1
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor traceToMetrics serviceGraph traceToLogs
      GF_INSTALL_PLUGINS: ""
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - tempo
      - elasticsearch

  # ── Payment Microservices (Java Spring Boot + OTEL Java Agent) ──────────────

  payment-initiation:
    <<: *service-defaults
    build:
      context: ./services
      dockerfile: Dockerfile
      args:
        SERVICE_MODULE: payment-initiation
    environment:
      <<: *otel-env
      SERVICE_NAME: payment-initiation
      OTEL_SERVICE_NAME: payment-initiation
      NEXT_SERVICE_URL: http://routing:8080
    ports:
      - "8001:8080"
    depends_on:
      - otel-collector

  routing:
    <<: *service-defaults
    build:
      context: ./services
      dockerfile: Dockerfile
      args:
        SERVICE_MODULE: routing
    environment:
      <<: *otel-env
      SERVICE_NAME: routing
      OTEL_SERVICE_NAME: routing
      NEXT_SERVICE_URL: http://transformer:8080
    ports:
      - "8002:8080"
    depends_on:
      - otel-collector

  transformer:
    <<: *service-defaults
    build:
      context: ./services
      dockerfile: Dockerfile
      args:
        SERVICE_MODULE: transformer
    environment:
      <<: *otel-env
      SERVICE_NAME: transformer
      OTEL_SERVICE_NAME: transformer
      NEXT_SERVICE_URL: http://payment-processor:8080
    ports:
      - "8003:8080"
    depends_on:
      - otel-collector

  payment-processor:
    <<: *service-defaults
    build:
      context: ./services
      dockerfile: Dockerfile
      args:
        SERVICE_MODULE: payment-processor
    environment:
      <<: *otel-env
      SERVICE_NAME: payment-processor
      OTEL_SERVICE_NAME: payment-processor
      NEXT_SERVICE_URL: http://accounting-generator:8080
    ports:
      - "8004:8080"
    depends_on:
      - otel-collector

  accounting-generator:
    <<: *service-defaults
    build:
      context: ./services
      dockerfile: Dockerfile
      args:
        SERVICE_MODULE: accounting-generator
    environment:
      <<: *otel-env
      SERVICE_NAME: accounting-generator
      OTEL_SERVICE_NAME: accounting-generator
      NEXT_SERVICE_URL: http://posting:8080
    ports:
      - "8005:8080"
    depends_on:
      - otel-collector

  posting:
    <<: *service-defaults
    build:
      context: ./services
      dockerfile: Dockerfile
      args:
        SERVICE_MODULE: posting
    environment:
      <<: *otel-env
      SERVICE_NAME: posting
      OTEL_SERVICE_NAME: posting
      NEXT_SERVICE_URL: http://dispatcher:8080
    ports:
      - "8006:8080"
    depends_on:
      - otel-collector

  dispatcher:
    <<: *service-defaults
    build:
      context: ./services
      dockerfile: Dockerfile
      args:
        SERVICE_MODULE: dispatcher
    environment:
      <<: *otel-env
      SERVICE_NAME: dispatcher
      OTEL_SERVICE_NAME: dispatcher
      NEXT_SERVICE_URL: http://response-handler:8080
    ports:
      - "8007:8080"
    depends_on:
      - otel-collector

  response-handler:
    <<: *service-defaults
    build:
      context: ./services
      dockerfile: Dockerfile
      args:
        SERVICE_MODULE: response-handler
    environment:
      <<: *otel-env
      SERVICE_NAME: response-handler
      OTEL_SERVICE_NAME: response-handler
    ports:
      - "8008:8080"
    depends_on:
      - otel-collector

  load-generator:
    <<: *service-defaults
    build:
      context: ./load_generator
    environment:
      TARGET_URL: http://payment-initiation:8080
      PAYMENTS_PER_MINUTE: "10"
    depends_on:
      - payment-initiation
    restart: on-failure

networks:
  payment-net:
    driver: bridge

volumes:
  es-data:
  tempo-data:
  prometheus-data:
  grafana-data:
  loki-data:
