server.port=8080
management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.health.show-details=never

# Log pattern — OTEL Java agent injects trace_id and span_id into MDC automatically.
# UETRTraceFilter injects payment.uetr.  All three appear on every log line.
logging.pattern.console=%d{HH:mm:ss.SSS} %-5level [%-22logger{22}] trace_id=%X{trace_id:-0} span_id=%X{span_id:-0} uetr=%X{payment.uetr:-} - %msg%n
