# Tempo 3.0 configuration
server:
  http_listen_port: 3200
  grpc_listen_port: 9095
  log_level: warn

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/blocks
    wal:
      path: /var/tempo/wal

# Generate service-graph and span metrics; remote-write them to Prometheus
# so Grafana's service map panel has data to query.
metrics_generator:
  registry:
    external_labels:
      source: tempo
      cluster: payment-system
  storage:
    path: /var/tempo/generator/wal
    remote_write:
      - url: http://prometheus:9090/api/v1/write
        send_exemplars: true
  processor:
    service_graphs:
      dimensions:
        - payment.stage
    span_metrics:
      dimensions:
        - payment.stage
        - payment.currency
        - payment.routing_rail

overrides:
  defaults:
    metrics_generator:
      processors: [service-graphs, span-metrics]
    ingestion:
      rate_limit_bytes: 15000000
      burst_size_bytes: 20000000
