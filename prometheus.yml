global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]

  - job_name: tempo
    static_configs:
      - targets: ["tempo:3200"]
    metrics_path: /metrics

  - job_name: payment-services
    static_configs:
      - targets:
          - "payment-initiation:8000"
          - "routing:8000"
          - "transformer:8000"
          - "payment-processor:8000"
          - "accounting-generator:8000"
          - "posting:8000"
          - "dispatcher:8000"
          - "response-handler:8000"
    metrics_path: /metrics
    relabel_configs:
      - source_labels: [__address__]
        target_label: service
        regex: "([^:]+):.*"
        replacement: "$1"
